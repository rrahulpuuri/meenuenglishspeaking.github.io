<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal — Meenu English Speaking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;font-size:15px;line-height:1.6;background:#f5f3ee;color:#1a1a2e;min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:14px}
:root{
  --saffron:#e8520a;--saffron-lt:#fdf0e8;--saffron-md:#fbd5b8;
  --navy:#1a1a2e;--navy-mid:#2d2d4a;
  --teal:#0e9e88;--teal-lt:#e0f7f4;
  --cream:#f5f3ee;--white:#ffffff;
  --border:rgba(26,26,46,0.09);--border-md:rgba(26,26,46,0.18);
  --muted:#6b6b80;
  --success-bg:#e6f8f2;--success-tx:#0a7a55;
  --warn-bg:#fff8e0;--warn-tx:#8a6000;
  --danger-bg:#fef0ee;--danger-tx:#c0340a;
  --info-bg:#eef4ff;--info-tx:#1e4db5;
}
h1,h2,h3,.sora{font-family:'Sora',sans-serif}

/* SHELL */
.shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--navy);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:0 0 24px;overflow-y:auto}
.sidebar-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:12px}
.sidebar-logo a{text-decoration:none;font-family:'Sora',sans-serif;font-size:17px;font-weight:700;color:#fff}
.sidebar-logo a span{color:var(--saffron)}
.back-link{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.35);margin-top:8px;text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:400;transition:color .15s}
.back-link:hover{color:rgba(255,255,255,0.65)}
.sidebar-section{padding:0 12px;margin-bottom:6px}
.sidebar-label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,0.28);padding:8px 10px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:14px;color:rgba(255,255,255,0.55);transition:background .15s,color .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.85)}
.nav-item.active{background:rgba(232,82,10,0.2);color:#fff;font-weight:500}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--saffron);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-spacer{flex:1}
.sidebar-user{margin:0 12px;padding:12px 14px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:12px;color:rgba(255,255,255,0.45)}
.sidebar-user strong{display:block;color:rgba(255,255,255,0.75);font-size:13px;margin-bottom:2px}

/* MAIN */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{padding:32px;flex:1}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:24px 28px}
.card+.card{margin-top:16px}
.card-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--muted);margin-bottom:20px}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.metric-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.metric-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.metric-val{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;color:var(--navy)}
.metric-sub{font-size:12px;color:var(--muted);margin-top:4px}
.metric-card.accent{background:var(--saffron);border-color:var(--saffron)}
.metric-card.accent .metric-label,.metric-card.accent .metric-val,.metric-card.accent .metric-sub{color:#fff}
.metric-card.accent .metric-label{color:rgba(255,255,255,0.75)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:8px;border:1px solid var(--border-md);cursor:pointer;font-size:14px;font-weight:500;background:var(--white);color:var(--navy);transition:background .15s,transform .1s;text-decoration:none;white-space:nowrap}
.btn:hover{background:var(--cream)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--saffron);color:#fff;border-color:var(--saffron)}
.btn-primary:hover{background:#c94508}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-teal:hover{background:#0b8571}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-xs{padding:4px 10px;font-size:12px}
.btn-danger{background:var(--danger-bg);color:var(--danger-tx);border-color:transparent}
.btn-danger:hover{background:#fde0d8}
.btn-success{background:var(--success-bg);color:var(--success-tx);border-color:transparent}
.btn-success:hover{background:#caf0e4}
.btn-ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--cream);color:var(--navy)}
.btn[disabled]{opacity:.45;cursor:not-allowed;pointer-events:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500}
.badge-pending{background:var(--warn-bg);color:var(--warn-tx)}
.badge-approved{background:var(--success-bg);color:var(--success-tx)}
.badge-rejected{background:var(--danger-bg);color:var(--danger-tx)}
.badge-active{background:var(--info-bg);color:var(--info-tx)}
.badge-free{background:var(--teal-lt);color:#066b5c}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:13px;color:var(--muted);font-weight:500}
.form-label .req{color:var(--saffron)}
input[type=text],input[type=email],input[type=tel],input[type=number],input[type=password],select,textarea{padding:9px 13px;border:1px solid var(--border-md);border-radius:8px;background:var(--white);color:var(--navy);font-size:14px;font-family:inherit;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--saffron);box-shadow:0 0 0 3px rgba(232,82,10,0.1)}
textarea{resize:vertical;min-height:90px;line-height:1.55}
.form-hint{font-size:12px;color:var(--muted)}
.form-error{font-size:12px;color:var(--danger-tx);display:none;margin-top:6px}
.form-error.show{display:block}

/* STEPS */
.step-bar{display:flex;align-items:flex-start;gap:0;margin-bottom:28px}
.step-item{display:flex;flex-direction:column;align-items:center;flex:1}
.step-circle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border-md);background:var(--white);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--muted);position:relative;z-index:1;transition:all .2s}
.step-circle.done{background:var(--saffron);border-color:var(--saffron);color:#fff}
.step-circle.current{border-color:var(--saffron);color:var(--saffron)}
.step-text{font-size:11px;color:var(--muted);margin-top:5px;text-align:center}
.step-text.current{color:var(--saffron);font-weight:500}
.step-connector{flex:1;height:2px;background:var(--border-md);margin-top:15px;transition:background .2s}
.step-connector.done{background:var(--saffron)}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--cream)}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.td-name{font-weight:600;font-size:14px}
.td-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* TUTOR CARDS */
.tutor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.tutor-card{background:var(--white);border:2px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:border-color .15s,transform .15s;display:flex;flex-direction:column}
.tutor-card:hover{border-color:var(--saffron-md);transform:translateY(-2px)}
.tutor-card.selected{border-color:var(--saffron);background:var(--saffron-lt)}
.tutor-avatar{width:48px;height:48px;border-radius:50%;background:var(--saffron-lt);color:var(--saffron);font-family:'Sora',sans-serif;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.tutor-name{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px}
.tutor-subject{font-size:12px;color:var(--muted);margin-bottom:8px}
.tutor-meta{font-size:12px;color:var(--muted);margin-top:auto}
.tutor-fee{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--saffron);margin-top:8px}

/* SLOTS */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.slot{padding:9px 10px;border:1.5px solid var(--border-md);border-radius:8px;text-align:center;font-size:13px;cursor:pointer;background:var(--white);transition:all .15s;user-select:none}
.slot:hover:not(.taken){border-color:var(--saffron);color:var(--saffron)}
.slot.taken{background:var(--cream);color:var(--muted);cursor:not-allowed;border-color:var(--border);font-size:12px}
.slot.chosen{background:var(--saffron);border-color:var(--saffron);color:#fff;font-weight:600}

/* ALERTS */
.alert{padding:13px 16px;border-radius:10px;font-size:14px;margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.alert-success{background:var(--success-bg);color:var(--success-tx)}
.alert-warn{background:var(--warn-bg);color:var(--warn-tx)}
.alert-danger{background:var(--danger-bg);color:var(--danger-tx)}
.alert-info{background:var(--info-bg);color:var(--info-tx)}

/* UPI */
.upi-panel{background:var(--cream);border:1px dashed var(--border-md);border-radius:12px;padding:24px;text-align:center}
.upi-qr{width:130px;height:130px;margin:14px auto;background:var(--white);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);flex-direction:column;gap:6px}
.upi-id{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;color:var(--saffron);margin:6px 0}
.upi-note{font-size:12px;color:var(--muted)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;transition:color .15s}
.tab.active{color:var(--saffron);border-bottom-color:var(--saffron)}
.tab:hover:not(.active){color:var(--navy)}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:20px 0}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}

/* SUCCESS */
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:56px;margin-bottom:16px}
.success-title{font-family:'Sora',sans-serif;font-size:22px;font-weight:800;margin-bottom:10px}
.success-sub{font-size:15px;color:var(--muted);max-width:400px;margin:0 auto 24px}
.summary-box{max-width:380px;margin:0 auto 24px;background:var(--cream);border-radius:12px;padding:18px 22px;text-align:left}
.summary-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)}
.summary-row:last-child{border-bottom:none}
.summary-row span:first-child{color:var(--muted)}

/* LOGIN */
.login-shell{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px)}
.login-box{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:400px}
.login-logo{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
.login-logo span{color:var(--saffron)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--white);border-radius:16px;padding:28px 32px;max-width:520px;width:100%;position:relative;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1}
.modal-close:hover{color:var(--navy)}

/* SECTION HEADER */
.section-hd{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;margin-top:4px}

/* MOBILE */
.mobile-topbar{display:none;background:var(--navy);padding:14px 20px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60}
.mobile-menu-open{display:none;flex-direction:column;background:var(--navy);padding:8px 12px 16px}
.mobile-menu-open.open{display:flex}
.mobile-nav-item{padding:11px 12px;color:rgba(255,255,255,0.65);font-size:14px;border-radius:8px;cursor:pointer;border:none;background:none;text-align:left;font-family:inherit}
.mobile-nav-item.active{background:rgba(232,82,10,0.2);color:#fff;font-weight:500}

/* SLOT MANAGER */
.slot-manager{margin-top:12px}
.slot-manager-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.slot-manager-row input{flex:1}
.slot-chip{display:inline-flex;align-items:center;gap:6px;background:var(--cream);border:1px solid var(--border-md);border-radius:6px;padding:5px 10px;font-size:13px;margin:4px}
.slot-chip button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;padding:0}
.slot-chip button:hover{color:var(--danger-tx)}

/* RESPONSIVE */
@media(max-width:860px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .mobile-topbar{display:flex}
  .metrics{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .form-grid-3{grid-template-columns:1fr 1fr}
  .content{padding:20px 16px}
  .topbar{padding:0 16px}
}
@media(max-width:540px){
  .metrics{grid-template-columns:1fr}
  .tutor-grid{grid-template-columns:1fr}
  .form-grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- MOBILE TOP BAR -->
<div class="mobile-topbar" id="mobileTopbar">
  <a href="index.html" style="font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:#fff;text-decoration:none">Meenu <span style="color:#e8520a">English</span></a>
  <button onclick="toggleMobileMenu()" style="background:none;border:none;color:#fff;font-size:22px;cursor:pointer">☰</button>
</div>
<div class="mobile-menu-open" id="mobileMenu"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- SHELL -->
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <a href="index.html">Meenu <span>English</span></a>
      <a href="index.html" class="back-link">← Back to website</a>
    </div>
    <div id="sidebarNav"></div>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-user" id="sidebarUser"></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbarTitle">Portal</div>
      <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
/* ── STATE ──────────────────────────────── */
const APP = {
  view: "home",
  adminAuthed: false,
  adminTab: "dashboard",
  sStep: 1, sData: {}, sTutorId: null, sSlot: null,
  tStep: 1,
  tutors: [
    {id:"t1",name:"Priya Sharma",initials:"PS",subject:"Spoken English & Grammar",exp:"4 yrs",bio:"B.Ed English. Builds conversation confidence for working professionals — practical, patient, and structured.",slots:["Mon 9am","Mon 11am","Wed 9am","Wed 3pm","Fri 10am","Fri 2pm"],booked:["Mon 11am"],rating:"4.9",students:23,status:"approved",phone:"98765 43210",email:"priya.sharma@example.com",city:"Delhi",fee:500,qual:"B.Ed English, MA Literature",days:"Mon, Wed, Fri"},
    {id:"t2",name:"Rajesh Verma",initials:"RV",subject:"Business English & IELTS",exp:"6 yrs",bio:"Former corporate trainer. Helps students crack IELTS and present confidently in professional meetings.",slots:["Tue 8am","Tue 6pm","Thu 8am","Thu 6pm","Sat 10am","Sat 12pm"],booked:["Tue 8am","Sat 10am"],rating:"4.8",students:41,status:"approved",phone:"91234 56789",email:"rajesh.verma@example.com",city:"Mumbai",fee:700,qual:"MBA, Certified IELTS Trainer",days:"Tue, Thu, Sat"},
    {id:"t3",name:"Sneha Iyer",initials:"SI",subject:"English for Beginners",exp:"2 yrs",bio:"Specialises in absolute beginners using a patient Hindi-medium approach — zero to conversational in 90 days.",slots:["Mon 7pm","Wed 7pm","Fri 7pm"],booked:[],rating:"4.7",students:12,status:"approved",phone:"99887 76655",email:"sneha.iyer@example.com",city:"Chennai",fee:400,qual:"BA English, B.Ed",days:"Mon, Wed, Fri evenings"},
    {id:"t4",name:"Amit Tiwari",initials:"AT",subject:"Pronunciation & Fluency",exp:"3 yrs",bio:"Phonetics-trained. Works on accent, clarity, and speaking speed so learners sound natural and confident.",slots:["Tue 10am","Thu 10am","Sat 2pm"],booked:["Thu 10am"],rating:"4.6",students:18,status:"pending",phone:"90011 22334",email:"amit.tiwari@example.com",city:"Lucknow",fee:450,qual:"MA English, Phonetics Diploma",days:"Tue, Thu, Sat"}
  ],
  students: [
    {id:"s1",name:"Ravi Kumar",email:"ravi@example.com",phone:"9000 111 222",city:"Kanpur",level:"Beginner",tutorId:"t3",slot:"Mon 7pm",fee:400,utr:"UTR8821934",date:"2025-06-01",status:"active",goal:"Want to speak English at work."},
    {id:"s2",name:"Meera Singh",email:"meera@example.com",phone:"9111 222 333",city:"Delhi",level:"Intermediate",tutorId:"t1",slot:"Mon 9am",fee:500,utr:"UTR2234567",date:"2025-06-03",status:"active",goal:"Improve email writing."},
    {id:"s3",name:"Suresh Yadav",email:"suresh@example.com",phone:"9222 333 444",city:"Mumbai",level:"Advanced",tutorId:"t2",slot:"Tue 6pm",fee:700,utr:"UTR9987654",date:"2025-06-05",status:"active",goal:"IELTS 7+ speaking score."}
  ]
};

/* read hash on load */
(function(){
  const h = location.hash.replace("#","");
  if(["home","student","tutor","admin"].includes(h)) APP.view = h;
})();

/* ── ROUTING ─────────────────────────────── */
const VIEWS = {
  home:    {label:"Home",           icon:"🏠", desc:"Portal Home"},
  student: {label:"Student Enroll", icon:"🎓", desc:"Enroll as Student"},
  tutor:   {label:"Tutor Register", icon:"📋", desc:"Apply as Tutor"},
  admin:   {label:"Admin",          icon:"⚙️",  desc:"Meenu's Dashboard"}
};

function go(view, skipReset) {
  if(!skipReset){
    if(view==="student"){APP.sStep=1;APP.sData={};APP.sTutorId=null;APP.sSlot=null}
    if(view==="tutor") APP.tStep=1;
  }
  APP.view = view;
  location.hash = view;
  render();
  window.scrollTo(0,0);
}
function setAdminTab(t){APP.adminTab=t;render()}

/* ── RENDER ──────────────────────────────── */
function render() {
  renderSidebar(); renderMobileMenu(); renderTopbar();
  const c = document.getElementById("content");
  if     (APP.view==="home")    c.innerHTML = renderHome();
  else if(APP.view==="student") c.innerHTML = renderStudent();
  else if(APP.view==="tutor")   c.innerHTML = renderTutor();
  else if(APP.view==="admin")   c.innerHTML = renderAdmin();
}

function renderSidebar(){
  const pending = APP.tutors.filter(t=>t.status==="pending").length;
  document.getElementById("sidebarNav").innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      ${Object.entries(VIEWS).map(([k,v])=>`
        <button class="nav-item${APP.view===k?" active":""}" onclick="go('${k}')">
          <span class="nav-icon">${v.icon}</span>${v.label}

    <div class="table-wrap"><table>
      <thead><tr><th>Student</th><th>Contact</th><th>Level</th><th>Tutor</th><th>Slot</th><th>Fee</th><th>UTR</th><th>Date</th></tr></thead>
      <tbody>${APP.students.map(s=>{const t=APP.tutors.find(t=>t.id===s.tutorId);return `<tr>
        <td><div class="td-name">${s.name}</div><div class="td-sub">${s.city}</div></td>
        <td><div style="font-size:12px">${s.email}</div><div style="font-size:12px">${s.phone}</div></td>
        <td><span class="badge badge-active">${s.level}</span></td>
        <td>${t?t.name:"—"}</td>
        <td>${s.slot}</td>
        <td style="font-weight:600;color:var(--saffron)">₹${s.fee}</td>
        <td style="font-size:11px;color:var(--muted);font-family:monospace">${s.utr}</td>
        <td style="font-size:12px">${s.date}</td>
      </tr>`;}).join("")}</tbody>
    </table></div>`;
  }
  else if(APP.adminTab==="slots"){
    const appr=APP.tutors.filter(t=>t.status==="approved");
    if(appr.length===0) body=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No approved tutors yet</div><p>Approve tutors first to manage their slots.</p></div>`;
    else body=appr.map(t=>{
      const free=t.slots.filter(sl=>!t.booked.includes(sl)).length;
      return `<div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-family:'Sora',sans-serif;font-weight:700;font-size:15px">${t.name}</div>
            <div style="font-size:12px;color:var(--muted)">${t.subject} · ₹${t.fee}/session</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="badge badge-active">${free} free</span>
            <span class="badge badge-pending">${t.booked.length} booked</span>
            <button class="btn btn-xs" onclick="openSlotManager('${t.id}')">+ Manage Slots</button>
          </div>
        </div>
        <div class="slot-grid">
          ${t.slots.length===0?`<div style="color:var(--muted);font-size:13px;padding:8px 0">No slots added yet. Click "Manage Slots" to add.</div>`:""}
          ${t.slots.map(sl=>`<div class="slot${t.booked.includes(sl)?" taken":""}">
            ${sl}${t.booked.includes(sl)?"<br><small>Booked</small>":""}
          </div>`).join("")}
        </div>
      </div>`;}).join("");
  }
  return `<div style="max-width:960px">${tabBar}${body}</div>`;
}

/* ── MODAL: TUTOR PROFILE ────────────────── */
function showTutorModal(id){
  const t=APP.tutors.find(t=>t.id===id);if(!t)return;
  const freeSlots=t.slots.filter(sl=>!t.booked.includes(sl));
  document.getElementById("modalContent").innerHTML=`
    <div style="display:flex;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap">
      <div class="tutor-avatar" style="width:56px;height:56px;font-size:18px;flex-shrink:0">${t.initials}</div>
      <div style="flex:1">
        <div style="font-family:'Sora',sans-serif;font-size:18px;font-weight:800">${t.name}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">${t.subject} · ${t.city} · ${t.exp}</div>
        <div style="margin-top:8px"><span class="badge badge-${t.status}">${t.status}</span></div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Sora',sans-serif;font-size:22px;font-weight:800;color:var(--saffron)">₹${t.fee}</div>
        <div style="font-size:12px;color:var(--muted)">per session</div>
        <div style="font-size:13px;margin-top:4px">★ ${t.rating} · ${t.students} students</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-hd">About</div>
    <p style="font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px">${t.bio}</p>
    <div class="section-hd">Qualifications</div>
    <p style="font-size:14px;margin-bottom:16px">${t.qual||"Not provided"}</p>
    <div class="section-hd">Available Slots (${freeSlots.length} free)</div>
    <div class="slot-grid" style="margin-bottom:20px">
      ${t.slots.length===0?`<div style="font-size:13px;color:var(--muted)">No slots listed yet.</div>`:""}
      ${t.slots.map(sl=>`<div class="slot${t.booked.includes(sl)?" taken":""}">${sl}${t.booked.includes(sl)?"<br><small>Booked</small>":""}</div>`).join("")}
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      ${t.status==="approved"?`<button class="btn btn-primary" onclick="closeModal();go('student')">Enroll with ${t.name.split(" ")[0]} →</button>`:""}
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>`;
  document.getElementById("modal").style.display="flex";
}

/* ── MODAL: SLOT MANAGER ─────────────────── */
function openSlotManager(id){
  const t=APP.tutors.find(t=>t.id===id);if(!t)return;
  document.getElementById("modalContent").innerHTML=`
    <div style="font-family:'Sora',sans-serif;font-size:17px;font-weight:700;margin-bottom:4px">Manage Slots — ${t.name}</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:18px">Add or remove available time slots. Booked slots cannot be removed.</p>
    <div class="section-hd">Current Slots</div>
    <div id="slotChips" style="margin-bottom:16px;min-height:36px">
      ${renderSlotChips(t)}
    </div>
    <div class="section-hd">Add New Slot</div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <select id="slotDay" style="flex:1">
        ${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<option>${d}</option>`).join("")}
      </select>
      <select id="slotTime" style="flex:1">
        ${["6am","7am","8am","9am","10am","11am","12pm","1pm","2pm","3pm","4pm","5pm","6pm","7pm","8pm","9pm"].map(t=>`<option>${t}</option>`).join("")}
      </select>
      <button class="btn btn-primary btn-sm" onclick="addSlot('${t.id}')">+ Add</button>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="closeModal();render()">Save & Close</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`;
  document.getElementById("modal").style.display="flex";
}
function renderSlotChips(t){
  if(t.slots.length===0) return `<span style="font-size:13px;color:var(--muted)">No slots yet.</span>`;
  return t.slots.map(sl=>`
    <span class="slot-chip">
      ${sl}
      ${t.booked.includes(sl)?`<span style="font-size:10px;color:var(--muted)">(booked)</span>`:
        `<button onclick="removeSlot('${t.id}','${sl}')" title="Remove slot">✕</button>`}
    </span>`).join("");
}
function addSlot(id){
  const t=APP.tutors.find(t=>t.id===id);if(!t)return;
  const day=document.getElementById("slotDay").value;
  const time=document.getElementById("slotTime").value;
  const slot=`${day} ${time}`;
  if(t.slots.includes(slot)){alert("This slot already exists.");return;}
  t.slots.push(slot);
  document.getElementById("slotChips").innerHTML=renderSlotChips(t);
}
function removeSlot(id,slot){
  const t=APP.tutors.find(t=>t.id===id);if(!t)return;
  if(t.booked.includes(slot)){alert("Cannot remove a booked slot.");return;}
  t.slots=t.slots.filter(s=>s!==slot);
  document.getElementById("slotChips").innerHTML=renderSlotChips(t);
}

/* ── MODAL HELPERS ───────────────────────── */
function closeModal(e){
  if(e&&e.target!==document.getElementById("modal"))return;
  document.getElementById("modal").style.display="none";
}

/* ── ACTIONS ─────────────────────────────── */
function saveStudentDetails(){
  const name=v("sName"),email=v("sEmail"),phone=v("sPhone"),city=v("sCity"),level=v("sLevel"),goal=v("sGoal");
  const err=document.getElementById("sFormErr");
  if(!name||!email||!phone||!level){showErr(err,"Please fill in all required fields.");return}
  if(!email.includes("@")){showErr(err,"Please enter a valid email address.");return}
  APP.sData={name,email,phone,city,level,goal};
  APP.sStep=4;render();
}
function completeEnroll(){
  const utr=v("sUTR");
  const err=document.getElementById("sPayErr");
  if(!utr||utr.length<8){showErr(err,"Please enter a valid UTR / transaction reference.");return}
  APP.sData.utr=utr;
  const t=APP.tutors.find(t=>t.id===APP.sTutorId);
  if(t)t.booked.push(APP.sSlot);
  APP.students.push({
    id:"s"+(APP.students.length+1),name:APP.sData.name,email:APP.sData.email,
    phone:APP.sData.phone,city:APP.sData.city,level:APP.sData.level,
    tutorId:APP.sTutorId,slot:APP.sSlot,fee:t.fee,utr,
    date:new Date().toISOString().split("T")[0],status:"active",goal:APP.sData.goal||""
  });
  APP.sStep=5;render();
}
function submitTutor(){
  const name=v("tName"),email=v("tEmail"),phone=v("tPhone"),city=v("tCity"),
        subject=v("tSubject"),exp=v("tExp"),qual=v("tQual"),bio=v("tBio"),fee=v("tFee"),days=v("tDays");
  const err=document.getElementById("tFormErr");
  if(!name||!email||!phone||!subject||!exp||!qual||!bio||!fee){showErr(err,"Please fill in all required fields.");return}
  APP.tutors.push({
    id:"t"+(APP.tutors.length+1),name,email,phone,city,subject,
    exp:exp+" yrs",qual,bio,fee:parseInt(fee)||500,days,
    initials:name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase(),
    rating:"New",students:0,status:"pending",slots:[],booked:[]
  });
  APP.tStep=2;render();
}
function approveTutor(id){
  const t=APP.tutors.find(t=>t.id===id);
  if(t){t.status="approved";if(t.slots.length===0)t.slots=["Mon 9am","Wed 9am","Fri 9am"]}
  render();
}
function rejectTutor(id){
  const t=APP.tutors.find(t=>t.id===id);
  if(t)t.status="rejected";
  render();
}
function adminLogin(){
  const pw=document.getElementById("adminPw").value;
  const err=document.getElementById("adminErr");
  if(pw==="meenu2025"){APP.adminAuthed=true;render()}
  else showErr(err,"Incorrect password. Please try again.");
}
function adminLogout(){APP.adminAuthed=false;APP.adminTab="dashboard";render()}

/* ── CSV ──────────────────────────────────── */
function dlCSV(type){
  let headers,rows;
  if(type==="students"){
    headers=["ID","Name","Email","Phone","City","Level","Goal","Tutor","Slot","Fee (₹)","UTR","Date","Status"];
    rows=APP.students.map(s=>{const t=APP.tutors.find(t=>t.id===s.tutorId);
      return[s.id,s.name,s.email,s.phone,s.city,s.level,s.goal||"",t?t.name:"",s.slot,s.fee,s.utr,s.date,s.status];});
  }else{
    headers=["ID","Name","Email","Phone","City","Specialisation","Exp","Qualifications","Bio","Fee (₹)","Availability","Status","Rating","Students"];
    rows=APP.tutors.map(t=>[t.id,t.name,t.email,t.phone,t.city,t.subject,t.exp,t.qual||"",t.bio,t.fee,t.days||"",t.status,t.rating,t.students]);
  }
  const esc=val=>`"${String(val).replace(/"/g,'""')}"`;
  const csv=[headers,...rows].map(r=>r.map(esc).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,\uFEFF"+encodeURIComponent(csv);
  a.download=`meenu_english_${type}_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
}

/* ── HELPERS ─────────────────────────────── */
function v(id){const el=document.getElementById(id);return el?el.value.trim():""}
function showErr(el,msg){if(!el)return;el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),4000)}

/* ── BOOT ────────────────────────────────── */
render();
</script>
